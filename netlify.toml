[build]
  command = "npm run build"
  publish = "dist"

# Root "/" stays the portfolio (React SPA index.html). The livestream demo
# landing lives at /free instead.
[[redirects]]
  from = "/free"
  to = "/demo.html"
  status = 200
  force = true

# Livestream guest pages: clean URLs -> their static .html files.
# These must come BEFORE the SPA catch-all or it swallows them.
[[redirects]]
  from = "/fred"
  to = "/fred.html"
  status = 200
  force = true

[[redirects]]
  from = "/games"
  to = "/games.html"
  status = 200
  force = true

[[redirects]]
  from = "/tank"
  to = "/tank.html"
  status = 200
  force = true

[[redirects]]
  from = "/battle"
  to = "/battle.html"
  status = 200
  force = true

# Portfolio (React SPA) is served at /portfolio and all other app routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
